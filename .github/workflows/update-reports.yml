name: Update Reports Dashboard

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-reports:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install psycopg2-binary python-dotenv
      
      - name: Generate report
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python generate_report.py
      
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Pull latest changes with rebase
          git pull origin master --rebase || true
          
          # Add the changed file
          git add data/reports.json
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update report $(date +'%Y-%m-%d %H:%M:%S')"
            # Try to push, if fails, pull and try again
            git push origin master || (git pull origin master --rebase && git push origin master)
          fi
