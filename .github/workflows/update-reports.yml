name: Update Reports Dashboard

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-reports:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
      
      - name: List files
        run: |
          echo "Files in repository:"
          ls -la
          echo "Checking for generate_report.py..."
          if [ -f "generate_report.py" ]; then
            echo "✅ generate_report.py found"
          else
            echo "❌ generate_report.py NOT found"
          fi
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install psycopg2-binary python-dotenv
      
      - name: Generate report
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "Running generate_report.py..."
          python generate_report.py
          echo "Checking generated file..."
          if [ -f "data/reports.json" ]; then
            echo "✅ reports.json generated"
            head -20 data/reports.json
          else
            echo "❌ reports.json NOT generated"
          fi
      
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/reports.json
          git diff --staged --quiet || (git commit -m "Auto-update report $(date +'%Y-%m-%d %H:%M:%S')" && git push)
